<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>FNAF Voice Archive</title>
  <link href="https://fonts.googleapis.com/css2?family=Share+Tech+Mono&family=Orbitron:wght@400;700;900&display=swap" rel="stylesheet">
  <style>
    :root {
      --bg: #0a0a0f;
      --surface: #111118;
      --card: #16161f;
      --border: #2a2a3a;
      --accent: #842593;
      --accent2: #d447ff;
      --text: #e8e8f0;
      --muted: #6b6b88;
      --active: #84259322;
      --line-bg: #1a1a26;
      --line-border: #2a2a3a;
    }

    * { margin: 0; padding: 0; box-sizing: border-box; }

    body {
      background: var(--bg);
      color: var(--text);
      font-family: 'Share Tech Mono', monospace;
      min-height: 100vh;
      background-image:
        radial-gradient(ellipse at 20% 0%, #ff6b1a0a 0%, transparent 50%),
        radial-gradient(ellipse at 80% 100%, #ff3a0a08 0%, transparent 50%);
    }

    header {
      text-align: center;
      padding: 48px 24px 32px;
      border-bottom: 1px solid var(--border);
      position: relative;
    }

    header::after {
      content: '';
      position: absolute;
      bottom: -1px;
      left: 50%;
      transform: translateX(-50%);
      width: 200px;
      height: 1px;
      background: var(--accent);
      box-shadow: 0 0 12px var(--accent);
    }

    h1 {
      font-family: 'Orbitron', monospace;
      font-size: clamp(1.6rem, 4vw, 2.8rem);
      font-weight: 900;
      letter-spacing: 0.12em;
      color: var(--accent);
      text-shadow: 0 0 30px #ff6b1a55;
    }

    .subtitle {
      color: var(--muted);
      font-size: 0.8rem;
      margin-top: 8px;
      letter-spacing: 0.2em;
      text-transform: uppercase;
    }

    .controls {
      display: flex;
      justify-content: center;
      gap: 8px;
      padding: 28px 24px 20px;
      flex-wrap: wrap;
    }

    .sort-btn {
      font-family: 'Share Tech Mono', monospace;
      font-size: 0.78rem;
      letter-spacing: 0.12em;
      text-transform: uppercase;
      padding: 10px 24px;
      border-radius: 8px;
      border: 1px solid var(--border);
      background: var(--surface);
      color: var(--muted);
      cursor: pointer;
      transition: all 0.2s ease;
    }

    .sort-btn:hover {
      border-color: var(--accent);
      color: var(--accent);
    }

    .sort-btn.active {
      background: var(--active);
      border-color: var(--accent);
      color: var(--accent);
      box-shadow: 0 0 12px #84259322;
    }

    .catalogue {
      padding: 16px 24px 60px;
      max-width: 1400px;
      margin: 0 auto;
    }

    .char-section {
      margin-bottom: 40px;
    }

    .char-header {
      display: flex;
      align-items: center;
      gap: 16px;
      background: var(--card);
      border: 1px solid var(--border);
      border-radius: 14px 14px 0 0;
      padding: 16px 20px;
      border-bottom: 1px solid var(--accent);
    }

    .char-portrait {
      width: 52px;
      height: 52px;
      border-radius: 10px;
      object-fit: cover;
      border: 1px solid var(--border);
      background: var(--surface);
      display: flex;
      align-items: center;
      justify-content: center;
      font-size: 1.6rem;
      flex-shrink: 0;
      overflow: hidden;
    }

    .char-portrait img {
      width: 100%;
      height: 100%;
      object-fit: cover;
      border-radius: 9px;
    }

    .char-info { flex: 1; }

    .char-name {
      font-family: 'Orbitron', monospace;
      font-size: 1rem;
      font-weight: 700;
      color: var(--accent2);
      letter-spacing: 0.08em;
    }

    .char-meta {
      font-size: 0.72rem;
      color: var(--muted);
      margin-top: 3px;
      letter-spacing: 0.1em;
    }

    .char-count {
      font-size: 0.72rem;
      color: var(--muted);
      background: var(--surface);
      border: 1px solid var(--border);
      border-radius: 20px;
      padding: 4px 12px;
    }

    .lines-grid {
      background: var(--card);
      border: 1px solid var(--border);
      border-top: none;
      border-radius: 0 0 14px 14px;
      padding: 16px;
      display: grid;
      grid-template-columns: repeat(5, 1fr);
      gap: 10px;
    }

    .voice-line {
      background: var(--line-bg);
      border: 1px solid var(--line-border);
      border-radius: 10px;
      padding: 10px 12px;
      display: flex;
      align-items: center;
      gap: 8px;
      transition: border-color 0.2s, background 0.2s;
    }

    .voice-line:hover {
      border-color: var(--accent);
      background: #8425930a;
    }

    .voice-line.playing {
      border-color: var(--accent);
      background: var(--active);
      box-shadow: 0 0 10px #39251a18;
    }

    .play-btn {
      width: 28px;
      height: 28px;
      border-radius: 50%;
      border: 1px solid var(--accent);
      background: transparent;
      color: var(--accent);
      cursor: pointer;
      display: flex;
      align-items: center;
      justify-content: center;
      flex-shrink: 0;
      font-size: 0.7rem;
      transition: background 0.15s;
      padding-left: 2px;
    }

    .play-btn:hover { background: var(--active); }
    .play-btn.playing { padding-left: 0; }

    .line-label {
      font-size: 0.72rem;
      color: var(--muted);
      white-space: nowrap;
      overflow: hidden;
      text-overflow: ellipsis;
      flex: 1;
    }

    .alpha-section { margin-bottom: 32px; }

    .alpha-divider {
      font-family: 'Orbitron', monospace;
      font-size: 0.8rem;
      color: var(--accent);
      letter-spacing: 0.2em;
      padding: 8px 4px;
      border-bottom: 1px solid var(--border);
      margin-bottom: 10px;
    }

    .alpha-grid {
      display: grid;
      grid-template-columns: repeat(5, 1fr);
      gap: 10px;
    }

    .alpha-line {
      background: var(--line-bg);
      border: 1px solid var(--line-border);
      border-radius: 10px;
      padding: 10px 12px;
      display: flex;
      align-items: center;
      gap: 8px;
      transition: border-color 0.2s;
    }

    .alpha-line:hover { border-color: var(--accent); }
    .alpha-line.playing { border-color: var(--accent); background: var(--active); }

    .line-char-tag {
      font-size: 0.6rem;
      color: var(--accent2);
      background: #d447ff15;
      border: 1px solid #d447ff30;
      border-radius: 4px;
      padding: 1px 5px;
      white-space: nowrap;
      flex-shrink: 0;
    }

    @media (max-width: 900px) {
      .lines-grid, .alpha-grid { grid-template-columns: repeat(3, 1fr); }
    }
    @media (max-width: 600px) {
      .lines-grid, .alpha-grid { grid-template-columns: repeat(2, 1fr); }
    }
  </style>
</head>

// ─────────────────────────────────────────────
let currentSort = 'game';
let currentAudio = null;
let currentBtn = null;

function setSort(mode) {
  currentSort = mode;
  document.querySelectorAll('.sort-btn').forEach(b => b.classList.remove('active'));
  document.getElementById('btn-' + mode).classList.add('active');
  render();
}

function stopCurrent() {
  if (currentAudio) { currentAudio.pause(); currentAudio.currentTime = 0; }
  if (currentBtn) {
    currentBtn.innerHTML = '▶';
    currentBtn.classList.remove('playing');
    currentBtn.closest('.voice-line, .alpha-line')?.classList.remove('playing');
  }
  currentAudio = null;
  currentBtn = null;
}

function playLine(audioSrc, btn, lineEl) {
  if (currentBtn === btn) { stopCurrent(); return; }
  stopCurrent();
  const audio = new Audio(audioSrc);
  currentAudio = audio;
  currentBtn = btn;
  btn.innerHTML = '⏹';
  btn.classList.add('playing');
  lineEl.classList.add('playing');
  audio.play().catch(() => {});
  audio.onended = () => {
    btn.innerHTML = '▶';
    btn.classList.remove('playing');
    lineEl.classList.remove('playing');
    currentAudio = null;
    currentBtn = null;
  };
}

function makeLineEl(line, charName, cls = 'voice-line') {
  const div = document.createElement('div');
  div.className = cls;

  const btn = document.createElement('button');
  btn.className = 'play-btn';
  btn.innerHTML = '▶';
  btn.title = 'Play ' + line.label;
  btn.onclick = () => playLine(line.audio, btn, div);

  const label = document.createElement('span');
  label.className = 'line-label';
  label.textContent = line.label;
  label.title = line.label;

  div.appendChild(btn);

  if (cls === 'alpha-line') {
    const tag = document.createElement('span');
    tag.className = 'line-char-tag';
    tag.textContent = charName.split(' ')[0];
    div.appendChild(tag);
  }

  div.appendChild(label);

  const dlBtn = document.createElement('a');
  dlBtn.href = line.audio;
  dlBtn.download = '';
  dlBtn.title = 'Download ' + line.label;
  dlBtn.style.cssText = `
    color: var(--muted);
    text-decoration: none;
    font-size: 0.85rem;
    flex-shrink: 0;
    transition: color 0.15s;
    margin-left: auto;
  `;
  dlBtn.innerHTML = '⬇';
  dlBtn.onmouseenter = () => dlBtn.style.color = 'var(--accent)';
  dlBtn.onmouseleave = () => dlBtn.style.color = 'var(--muted)';
  div.appendChild(dlBtn);

  return div;
}

function renderByCharacter(sorted) {
  const cat = document.getElementById('catalogue');
  cat.innerHTML = '';
  sorted.forEach(char => {
    const section = document.createElement('div');
    section.className = 'char-section';

    const header = document.createElement('div');
    header.className = 'char-header';

    const portrait = document.createElement('div');
    portrait.className = 'char-portrait';
    if (char.portrait) {
      portrait.innerHTML = `<img src="${char.portrait}" alt="${char.character}">`;
    } else {
      portrait.textContent = char.emoji;
    }

    const info = document.createElement('div');
    info.className = 'char-info';
    info.innerHTML = `<div class="char-name">${char.character}</div><div class="char-meta">${char.game}</div>`;

    const count = document.createElement('div');
    count.className = 'char-count';
    count.textContent = char.lines.length + ' lines';

    header.appendChild(portrait);
    header.appendChild(info);
    header.appendChild(count);

    const grid = document.createElement('div');
    grid.className = 'lines-grid';
    char.lines.forEach(line => {
      grid.appendChild(makeLineEl(line, char.character, 'voice-line'));
    });

    section.appendChild(header);
    section.appendChild(grid);
    cat.appendChild(section);
  });
}

function renderAlpha() {
  const all = [];
  data.forEach(char => {
    char.lines.forEach(line => {
      all.push({ ...line, character: char.character, game: char.game });
    });
  });
  all.sort((a, b) => a.label.localeCompare(b.label));

  const groups = {};
  all.forEach(line => {
    const letter = line.label[0].toUpperCase();
    if (!groups[letter]) groups[letter] = [];
    groups[letter].push(line);
  });

  const cat = document.getElementById('catalogue');
  cat.innerHTML = '';
  Object.keys(groups).sort().forEach(letter => {
    const section = document.createElement('div');
    section.className = 'alpha-section';

    const divider = document.createElement('div');
    divider.className = 'alpha-divider';
    divider.textContent = '— ' + letter;

    const grid = document.createElement('div');
    grid.className = 'alpha-grid';
    groups[letter].forEach(line => {
      grid.appendChild(makeLineEl(line, line.character, 'alpha-line'));
    });

    section.appendChild(divider);
    section.appendChild(grid);
    cat.appendChild(section);
  });
}

function renderByGame() {
  const sorted = [...data].sort((a, b) => {
  if (a.gameOrder !== b.gameOrder) return a.gameOrder - b.gameOrder;
  if (a.game === 'UCN' && b.game === 'UCN') return (a.order ?? 999) - (b.order ?? 999);
  return a.character.localeCompare(b.character);
});
  const games = {};
  sorted.forEach(char => {
    if (!games[char.game]) games[char.game] = [];
    games[char.game].push(char);
  });

  const cat = document.getElementById('catalogue');
  cat.innerHTML = '';

  Object.keys(games).forEach(game => {
    const gameHeader = document.createElement('div');
    gameHeader.style.cssText = `
      font-family: 'Orbitron', monospace;
      font-size: 1.2rem;
      color: var(--accent);
      letter-spacing: 0.2em;
      text-transform: uppercase;
      padding: 10px 4px 6px;
      border-bottom: 1px solid var(--border);
      margin-bottom: 16px;
      margin-top: 16px;
    `;
    gameHeader.textContent = '◆ ' + game;
    cat.appendChild(gameHeader);

    games[game].forEach(char => {
      const section = document.createElement('div');
      section.className = 'char-section';

      const header = document.createElement('div');
      header.className = 'char-header';

      const portrait = document.createElement('div');
      portrait.className = 'char-portrait';
      if (char.portrait) {
        portrait.innerHTML = `<img src="${char.portrait}" alt="${char.character}">`;
      } else {
        portrait.textContent = char.emoji;
      }

      const info = document.createElement('div');
      info.className = 'char-info';
      info.innerHTML = `<div class="char-name">${char.character}</div><div class="char-meta">${char.game}</div>`;

      const count = document.createElement('div');
      count.className = 'char-count';
      count.textContent = char.lines.length + ' lines';

      header.appendChild(portrait);
      header.appendChild(info);
      header.appendChild(count);

      const grid = document.createElement('div');
      grid.className = 'lines-grid';
      char.lines.forEach(line => {
        grid.appendChild(makeLineEl(line, char.character, 'voice-line'));
      });

      section.appendChild(header);
      section.appendChild(grid);
      cat.appendChild(section);
    });
  });
}

function render() {
  stopCurrent();
  if (currentSort === 'character') {
    const sorted = [...data].sort((a, b) => a.character.localeCompare(b.character));
    renderByCharacter(sorted);
  } else if (currentSort === 'alpha') {
    renderAlpha();
  } else if (currentSort === 'game') {
    renderByGame();
  }
}

render();
