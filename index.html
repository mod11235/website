<!DOCTYPE html>
<html>
<head>
  <title>My First Website</title>

  <style>
    body {
      font-family: Arial;
      text-align: center;
      margin-top: 100px;
      background: #f4f4f4;
    }

    h1 {
      color: #333;
    }

    p {
      color: #666;
      font-size: 20px;
    }

    button {
      padding: 12px 20px;
      font-size: 18px;
      border: none;
      border-radius: 10px;
      background: black;
      color: white;
      cursor: pointer;
    }

    button:hover {
      opacity: 0.8;
    }
  </style>
</head>

<body>
  <h1>Hello World 🚀</h1>
  <p>I made my first website!</p>

  <button onclick="alert('Website working!')">
    Click Me
  </button>
</body>
</html>
