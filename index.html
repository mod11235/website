<!-- Sidebar -->

<!DOCTYPE html>
<html>
<head>
  <title>Sidebar Website</title>

  <style>
    body {
      margin: 0;
      font-family: Arial, sans-serif;
      display: flex;
    }

    /* Sidebar */
    .sidebar {
      width: 250px;
      height: 100vh;
      background-color: #202123;
      color: white;
      position: fixed;
      left: -250px;
      top: 0;
      transition: 0.3s;
      padding-top: 60px;
    }

    .sidebar a {
      display: block;
      color: white;
      padding: 15px 20px;
      text-decoration: none;
    }

    .sidebar a:hover {
      background-color: #343541;
    }

    /* Open sidebar */
    .sidebar.active {
      left: 0;
    }

    /* Top bar */
    .topbar {
      width: 100%;
      height: 60px;
      background-color: #111;
      color: white;
      display: flex;
      align-items: center;
      padding: 0 20px;
      box-sizing: border-box;
    }

    /* Menu button */
    .menu-btn {
      font-size: 24px;
      cursor: pointer;
      margin-right: 15px;
    }

    /* Main content */
    .content {
      margin-top: 60px;
      padding: 20px;
      width: 100%;
    }
  </style>
</head>

<body>

  <!-- Sidebar -->
  <div id="sidebar" class="sidebar">
    <a href="index.html">Home</a>
    <a href="about.html">About</a>
    <a href="projects.html">Projects</a>
    <a href="contact.html">Contact</a>
  </div>

  <!-- Main area -->
  <div style="width:100%;">
    
    <!-- Top bar -->
    <div class="topbar">
      <span class="menu-btn" onclick="toggleSidebar()">☰</span>
      <h2>My Website</h2>
    </div>

    <!-- Page content -->
    <div class="content">
      <h1>Welcome!</h1>
      <p>This is the homepage.</p>
    </div>

  </div>

  <script>
    function toggleSidebar() {
      document.getElementById("sidebar").classList.toggle("active");
    }
  </script>

</body>
</html>
